# Prometheus Base Values
# Fork: lfblooms/prometheus-community.helm-charts
# Chart: charts/prometheus

# Server configuration
server:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistentVolume:
    enabled: false

  service:
    type: ClusterIP

# Alertmanager
alertmanager:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Pushgateway
pushgateway:
  enabled: false

# Node exporter
nodeExporter:
  enabled: true

# Kube state metrics
kubeStateMetrics:
  enabled: true
