# Infisical Base Values
# Shared configuration across all deployment contexts
# Layer context-specific values on top: helm install ... -f base.yaml -f <context>.yaml

# Use pre-created secret with ENCRYPTION_KEY, AUTH_SECRET, SITE_URL
infisical:
  existingSecret: infisical-secrets

# Service account for workload identity
serviceAccount:
  create: true
  annotations: {}

# Internal service - use ingress for external access
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Health checks
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Security hardening
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
