# Vault Base Values
# Fork: lfblooms/hashicorp.vault-helm
# Chart: . (root)

# Server configuration
server:
  enabled: true

  # Dev mode (for local development only)
  dev:
    enabled: false

  # Standalone mode
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Data storage
  dataStorage:
    enabled: true
    size: 10Gi

  # Service
  service:
    enabled: true
    type: ClusterIP

# UI
ui:
  enabled: true

# Injector
injector:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
