# ingress-nginx Base Values
# Fork: lfblooms/kubernetes.ingress-nginx
# Chart: charts/ingress-nginx

controller:
  # Service configuration
  service:
    type: LoadBalancer

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Metrics
  metrics:
    enabled: true

  # Admission webhooks
  admissionWebhooks:
    enabled: true
