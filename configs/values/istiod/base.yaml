# Istiod (Control Plane) Base Values
# Fork: MisterGrinvalds/istio.istio
# Chart: manifests/charts/istio-control/istio-discovery

# Pilot configuration
pilot:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Global mesh configuration
global:
  # Proxy configuration
  proxy:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Mesh configuration
meshConfig:
  enablePrometheusMerge: true
  defaultConfig:
    proxyMetadata: {}
