# Keycloak (Bitnami) Base Values
# Fork: MisterGrinvalds/bitnami.charts
# Chart: bitnami/keycloak

# Authentication
auth:
  adminUser: admin
  # adminPassword: set via secret

# Service
service:
  type: ClusterIP
  ports:
    http: 80
    https: 443

# Persistence
postgresql:
  enabled: true
  auth:
    # postgresPassword: set via secret
    database: keycloak

# Resources
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Probes
livenessProbe:
  enabled: true
readinessProbe:
  enabled: true
