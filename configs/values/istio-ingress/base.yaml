# Istio Ingress Gateway Base Values
# Fork: lfblooms/istio.istio
# Chart: manifests/charts/gateways/istio-ingress

# Service configuration
service:
  type: LoadBalancer
  ports:
    - port: 15021
      targetPort: 15021
      name: status-port
    - port: 80
      targetPort: 8080
      name: http2
    - port: 443
      targetPort: 8443
      name: https

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
