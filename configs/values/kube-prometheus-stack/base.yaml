# kube-prometheus-stack Base Values
# Fork: MisterGrinvalds/prometheus-community.helm-charts
# Chart: charts/kube-prometheus-stack

# Grafana
grafana:
  enabled: true
  adminPassword: admin
  service:
    type: ClusterIP

# Prometheus
prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    retention: 10d
    storageSpec: {}

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Node exporter
nodeExporter:
  enabled: true

# Kube state metrics
kubeStateMetrics:
  enabled: true

# Prometheus operator
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
