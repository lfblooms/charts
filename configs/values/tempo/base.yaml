# Tempo Base Values
# Fork: MisterGrinvalds/grafana.helm-charts
# Chart: charts/tempo

# Tempo configuration
tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

# Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Persistence
persistence:
  enabled: false
