# Reloader Base Values
# Fork: lfblooms/stakater.Reloader
# Chart: deployments/kubernetes/chart/reloader

reloader:
  # Watch all namespaces
  watchGlobally: true

  # Reload strategy: default, env-vars, or annotations
  reloadStrategy: default

  # Log level: trace, debug, info, warning, error, fatal, panic
  logLevel: info

  deployment:
    replicas: 1
    revisionHistoryLimit: 2

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
