# Harbor Base Values
# Fork: MisterGrinvalds/goharbor.harbor-helm
# Chart: . (root)

# Expose configuration
expose:
  type: ingress
  tls:
    enabled: true
    # certSource: auto
  ingress:
    hosts:
      core: harbor.local

# External URL
externalURL: https://harbor.local

# Persistence
persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 10Gi
    database:
      size: 5Gi
    redis:
      size: 1Gi
    trivy:
      size: 5Gi

# Harbor components
portal:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

core:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

registry:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Trivy vulnerability scanner
trivy:
  enabled: true
