# Template values file demonstrating best practices
# Copy and customize for your chart

# Replica configuration
replicaCount: 1

# Image configuration
image:
  repository: myregistry/myapp
  tag: "v1.0.0"  # Always pin in production
  pullPolicy: IfNotPresent

# Image pull secrets (if using private registry)
imagePullSecrets: []
  # - name: my-registry-secret

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Security contexts
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 80

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Health checks
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Metrics and monitoring
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# Network policy
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Extra environment variables
extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

# Extra volumes and mounts
extraVolumes: []
extraVolumeMounts: []
