{{/*
Only create this secret if existingSecret is not specified.
This allows users to provide their own secret or use this template.
*/}}
{{- if not .Values.infisical.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "infisical.fullname" . }}-secrets
  labels:
    {{- include "infisical.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{/*
  IMPORTANT: Replace these placeholder values with actual secrets!
  In production, use an external secret management solution.
  */}}
  ENCRYPTION_KEY: "REPLACE_ME_32_CHAR_HEX_STRING_00"
  AUTH_SECRET: "REPLACE_ME_WITH_SECURE_RANDOM_STRING"
  {{- if .Values.infisical.siteUrl }}
  SITE_URL: {{ .Values.infisical.siteUrl | quote }}
  {{- else }}
  SITE_URL: "https://infisical.local"
  {{- end }}
{{- end }}
