# Default values for Infisical
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: infisical/infisical
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Infisical configuration
infisical:
  # -- Name of existing secret containing Infisical secrets
  # Required keys: ENCRYPTION_KEY, AUTH_SECRET, SITE_URL
  # Optional keys: DB_CONNECTION_URI, REDIS_URL, DB_ROOT_CERT
  existingSecret: "infisical-secrets"

  # -- Site URL (required) - Only used if not using existingSecret
  siteUrl: ""

  # -- Additional environment variables
  extraEnv: []
  # - name: SMTP_HOST
  #   value: "smtp.example.com"
  # - name: SMTP_PORT
  #   value: "587"

  # -- Additional environment variables from secrets/configmaps
  extraEnvFrom: []
  # - secretRef:
  #     name: my-secret
  # - configMapRef:
  #     name: my-configmap

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  # -- Annotations for the service
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: infisical.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: infisical-tls
  #   hosts:
  #     - infisical.local

resources:
  limits:
    memory: 1000Mi
  requests:
    cpu: 350m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# -- Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Liveness probe configuration
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# -- PostgreSQL subchart configuration
# See https://github.com/bitnami/charts/tree/main/bitnami/postgresql
postgresql:
  # -- Enable PostgreSQL subchart
  enabled: true
  auth:
    # -- PostgreSQL database name
    database: infisical
    # -- PostgreSQL username
    username: infisical
    # -- PostgreSQL password (use existingSecret in production)
    password: ""
    # -- Name of existing secret with PostgreSQL credentials
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 10Gi
  # -- For production, consider using:
  # - External managed database (RDS, Cloud SQL, etc.)
  # - Zalando Postgres Operator for HA

# -- Redis subchart configuration
# See https://github.com/bitnami/charts/tree/main/bitnami/redis
redis:
  # -- Enable Redis subchart
  enabled: true
  auth:
    # -- Redis password (use existingSecret in production)
    password: ""
    # -- Name of existing secret with Redis credentials
    existingSecret: ""
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 5Gi
  # -- For production, consider using:
  # - External managed Redis (ElastiCache, Memorystore, etc.)

# -- External database configuration (when postgresql.enabled=false)
externalDatabase:
  # -- Database connection URI
  # Format: postgres://user:password@host:port/database
  uri: ""
  # -- Name of existing secret containing DB_CONNECTION_URI
  existingSecret: ""
  # -- Key in the secret containing the connection URI
  secretKey: "DB_CONNECTION_URI"
  # -- Root certificate for SSL connections (optional)
  rootCert: ""

# -- External Redis configuration (when redis.enabled=false)
externalRedis:
  # -- Redis connection URL
  # Format: redis://user:password@host:port
  url: ""
  # -- Name of existing secret containing REDIS_URL
  existingSecret: ""
  # -- Key in the secret containing the Redis URL
  secretKey: "REDIS_URL"
