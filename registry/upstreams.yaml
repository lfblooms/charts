# registry/upstreams.yaml — Upstream Helm chart sources
#
# Maps each chart to where it can be pulled from upstream.
# Used by scripts/mirror-chart.sh to discover and pull chart versions.
#
# Fields:
#   source_type:  "repo" (traditional Helm repo), "oci" (OCI registry), or "local" (built from fork)
#   repo_name:    Helm repo alias for `helm repo add` (repo type only)
#   repo_url:     Helm repository URL (repo type only)
#   oci_url:      OCI base URL without chart name (oci type only)
#   chart_path:   Local path to chart directory (local type only)
#   chart_name:   Chart name as published upstream

upstreams:

  # ============================================================================
  # GITOPS & CD
  # ============================================================================

  argo-cd:
    source_type: repo
    repo_name: argo
    repo_url: https://argoproj.github.io/argo-helm
    chart_name: argo-cd

  # ============================================================================
  # SECRETS MANAGEMENT
  # ============================================================================

  cert-manager:
    source_type: repo
    repo_name: jetstack
    repo_url: https://charts.jetstack.io
    chart_name: cert-manager

  external-secrets:
    source_type: repo
    repo_name: external-secrets
    repo_url: https://charts.external-secrets.io
    chart_name: external-secrets

  vault:
    source_type: repo
    repo_name: hashicorp
    repo_url: https://helm.releases.hashicorp.com
    chart_name: vault

  vault-secrets-operator:
    source_type: repo
    repo_name: hashicorp
    repo_url: https://helm.releases.hashicorp.com
    chart_name: vault-secrets-operator

  # ============================================================================
  # NETWORKING
  # ============================================================================

  ingress-nginx:
    source_type: repo
    repo_name: ingress-nginx
    repo_url: https://kubernetes.github.io/ingress-nginx
    chart_name: ingress-nginx

  external-dns:
    source_type: repo
    repo_name: bitnami
    repo_url: https://charts.bitnami.com/bitnami
    chart_name: external-dns

  tailscale-operator:
    source_type: repo
    repo_name: tailscale
    repo_url: https://pkgs.tailscale.com/helmcharts
    chart_name: tailscale-operator

  # ============================================================================
  # SERVICE MESH (ISTIO)
  # ============================================================================

  base:
    source_type: repo
    repo_name: istio
    repo_url: https://istio-release.storage.googleapis.com/charts
    chart_name: base

  istiod:
    source_type: repo
    repo_name: istio
    repo_url: https://istio-release.storage.googleapis.com/charts
    chart_name: istiod

  cni:
    source_type: repo
    repo_name: istio
    repo_url: https://istio-release.storage.googleapis.com/charts
    chart_name: cni

  gateway:
    source_type: repo
    repo_name: istio
    repo_url: https://istio-release.storage.googleapis.com/charts
    chart_name: gateway

  # ============================================================================
  # OBSERVABILITY
  # ============================================================================

  grafana:
    source_type: repo
    repo_name: grafana
    repo_url: https://grafana.github.io/helm-charts
    chart_name: grafana

  loki:
    source_type: repo
    repo_name: grafana
    repo_url: https://grafana.github.io/helm-charts
    chart_name: loki

  tempo:
    source_type: repo
    repo_name: grafana
    repo_url: https://grafana.github.io/helm-charts
    chart_name: tempo

  mimir-distributed:
    source_type: repo
    repo_name: grafana
    repo_url: https://grafana.github.io/helm-charts
    chart_name: mimir-distributed

  kube-prometheus-stack:
    source_type: repo
    repo_name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts
    chart_name: kube-prometheus-stack

  prometheus:
    source_type: repo
    repo_name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts
    chart_name: prometheus

  # ============================================================================
  # SECURITY & POLICY
  # ============================================================================

  kyverno:
    source_type: repo
    repo_name: kyverno
    repo_url: https://kyverno.github.io/kyverno
    chart_name: kyverno

  kyverno-policies:
    source_type: repo
    repo_name: kyverno
    repo_url: https://kyverno.github.io/kyverno
    chart_name: kyverno-policies

  policy-reporter:
    source_type: repo
    repo_name: policy-reporter
    repo_url: https://kyverno.github.io/policy-reporter
    chart_name: policy-reporter

  kiali-server:
    source_type: repo
    repo_name: kiali
    repo_url: https://kiali.org/helm-charts
    chart_name: kiali-server

  # ============================================================================
  # STORAGE & REGISTRY
  # ============================================================================

  harbor:
    source_type: repo
    repo_name: harbor
    repo_url: https://helm.goharbor.io
    chart_name: harbor

  minio:
    source_type: repo
    repo_name: minio
    repo_url: https://charts.min.io/
    chart_name: minio

  # ============================================================================
  # IDENTITY & ACCESS
  # ============================================================================

  keycloak:
    source_type: oci
    oci_url: oci://registry-1.docker.io/bitnamicharts
    chart_name: keycloak

  # ============================================================================
  # APPLICATION PLATFORMS
  # ============================================================================

  nextcloud:
    source_type: repo
    repo_name: nextcloud
    repo_url: https://nextcloud.github.io/helm/
    chart_name: nextcloud

  reloader:
    source_type: repo
    repo_name: stakater
    repo_url: https://stakater.github.io/stakater-charts
    chart_name: reloader

  # ============================================================================
  # LOCAL CHARTS (built from fork source, no upstream registry)
  # ============================================================================

  infisical:
    source_type: local
    chart_path: forks/infisical/helm-charts/infisical-standalone-postgres
    chart_name: infisical-standalone-postgres

  infisical-gateway:
    source_type: local
    chart_path: forks/infisical/helm-charts/infisical-gateway
    chart_name: infisical-gateway
